<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="description" content="ChickenFlow — Poultry Business Manager. Manage vehicles, sales, customers, suppliers, accounts and reports." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChickenFlow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Open Graph -->
    <meta property="og:title" content="ChickenFlow" />
    <meta property="og:description" content="Poultry Business Manager" />
    <meta property="og:type" content="website" />
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>ChickenFlow 🐔</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #171614; }
      #root { height: 100%; }
      #splash {
        position: fixed; inset: 0; background: #171614;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        z-index: 99999; transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-emoji { font-size: 72px; animation: bounce 1s ease infinite alternate; }
      #splash-title { color: #f59e0b; font-family: sans-serif; font-size: 24px; font-weight: 800; }
      #splash-sub { color: #7a7974; font-family: sans-serif; font-size: 13px; }
      @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <div id="splash-emoji">🐔</div>
      <div id="splash-title">ChickenFlow</div>
      <div id="splash-sub">Loading your business data...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 500); }
        }, 800);
      });
    </script>
  </body>
</html>
